<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="p-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#eef0f6"/>
    </linearGradient>
    <linearGradient id="p-header" x1="100" y1="160" x2="412" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="p-pin" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="p-dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="p-shadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#6366f1" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="112" fill="url(#p-bg)"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="#e2e5ef" stroke-width="3"/>

  <!-- Calendar card -->
  <g filter="url(#p-shadow)">
    <rect x="96" y="152" width="320" height="256" rx="28" fill="white"/>
  </g>
  <rect x="96" y="152" width="320" height="256" rx="28" fill="white" stroke="#dde2ef" stroke-width="2"/>

  <!-- Calendar header -->
  <rect x="96" y="152" width="320" height="88" rx="28" fill="url(#p-header)"/>
  <rect x="96" y="196" width="320" height="44" fill="url(#p-header)"/>

  <!-- Header label -->
  <text x="256" y="207" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="22" font-family="Helvetica Neue, Helvetica, sans-serif" font-weight="600" letter-spacing="6">EVENTS</text>

  <!-- Hanging pins -->
  <rect x="170" y="116" width="26" height="64" rx="13" fill="url(#p-pin)"/>
  <rect x="316" y="116" width="26" height="64" rx="13" fill="url(#p-pin)"/>
  <circle cx="183" cy="116" r="13" fill="#818cf8"/>
  <circle cx="329" cy="116" r="13" fill="#818cf8"/>

  <!-- Day grid row 1 -->
  <rect x="130" y="276" width="34" height="34" rx="8" fill="#eef0f8"/>
  <rect x="196" y="276" width="34" height="34" rx="8" fill="#eef0f8"/>
  <rect x="262" y="276" width="34" height="34" rx="8" fill="#eef0f8"/>
  <rect x="328" y="276" width="34" height="34" rx="8" fill="#eef0f8"/>

  <!-- Day grid row 2 -->
  <rect x="130" y="340" width="34" height="34" rx="8" fill="#eef0f8"/>
  <rect x="196" y="340" width="34" height="34" rx="8" fill="#eef0f8"/>
  <rect x="262" y="340" width="34" height="34" rx="8" fill="#eef0f8"/>

  <!-- Accent event dot -->
  <rect x="328" y="340" width="34" height="34" rx="8" fill="url(#p-dot)"/>
  <rect x="338" y="350" width="14" height="3" rx="1.5" fill="rgba(255,255,255,0.8)"/>
  <rect x="335" y="357" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.6)"/>
</svg>
